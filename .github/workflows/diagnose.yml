name: Diagnose VPS

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 22 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Systemd status + recent logs
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} \
            "echo '=== systemctl status ==='
             systemctl status quantprism --no-pager | head -20
             echo ''
             echo '=== journalctl last 80 lines ==='
             journalctl -u quantprism --no-pager -n 80
             echo ''
             echo '=== env check ==='
             grep -c LONGPORT /opt/quant/Quant/.env || echo 'no longport in env'
             echo ''
             echo '=== longport pip status ==='
             /opt/quant/Quant/venv/bin/pip show longport 2>&1 | head -5 || echo 'not installed'
             echo ''
             echo '=== fuser port 8000 ==='
             fuser 8000/tcp 2>&1 || echo 'no process on 8000'
             echo ''
             echo '=== curl localhost ==='
             curl -sI -m 10 http://127.0.0.1:8000/sentiment | head -5 || echo 'timeout/fail'"
