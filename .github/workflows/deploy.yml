name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync app files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "app/,requirements.txt,scripts/"
          target: "/opt/quant/Quant/"
          strip_components: 0

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/quant/Quant

            # Install any new dependencies
            venv/bin/pip install -q -r requirements.txt 2>/dev/null || true

            # Restart
            systemctl restart quantprism
            sleep 3
            systemctl is-active --quiet quantprism && echo "✅ Deploy OK" || \
              (systemctl status quantprism --no-pager && exit 1)
