name: Deploy to VPS

on:
  push:
    branches: [main]

env:
  SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  IBKR_BACKEND_SECRET: ${{ secrets.IBKR_BACKEND_SECRET }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync app files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "app/,requirements.txt,scripts/,deploy/"
          target: "/opt/quant/Quant/"
          strip_components: 0

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSH key ready"

      - name: Configure env and restart service
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} bash << 'ENDSSH'
          set -e
          cd /opt/quant/Quant

          # Fix ownership
          chown -R www-data:www-data app/ requirements.txt scripts/ 2>/dev/null || true
          chmod +x scripts/run_prod.sh

          # 同步 systemd service（EnvironmentFile 模式，读取 .env）
          if ! diff -q deploy/systemd/quantprism.service /etc/systemd/system/quantprism.service > /dev/null 2>&1; then
            cp deploy/systemd/quantprism.service /etc/systemd/system/quantprism.service
            systemctl daemon-reload
            echo "systemd service updated"
          fi

          # 同步 nginx 配置（proxy_pass 到 uvicorn）
          cp /etc/nginx/sites-enabled/caotaibanzi.xyz.conf /tmp/nginx_caotaibanzi.bak 2>/dev/null || true
          if ! diff -q deploy/caotaibanzi.xyz.conf /etc/nginx/sites-enabled/caotaibanzi.xyz.conf > /dev/null 2>&1; then
            cp deploy/caotaibanzi.xyz.conf /etc/nginx/sites-enabled/caotaibanzi.xyz.conf
            echo "=== nginx -t ==="
            if nginx -t 2>&1; then
              systemctl reload nginx && echo "nginx config updated"
            else
              echo "nginx -t failed, reverting"
              cp /tmp/nginx_caotaibanzi.bak /etc/nginx/sites-enabled/caotaibanzi.xyz.conf 2>/dev/null || true
            fi
          else
            echo "nginx config unchanged"
            nginx -t 2>&1 && systemctl reload nginx || true
          fi

          # Install dependencies
          venv/bin/pip install -q -r requirements.txt

          # Stop service cleanly, clear port 8000, start fresh
          systemctl stop quantprism || true
          sleep 3
          PORT_PID=$(fuser 8000/tcp 2>/dev/null | awk '{print $1}') || true
          if [ -n "$PORT_PID" ]; then
            echo "Killing stale PID $PORT_PID on port 8000"
            kill -9 "$PORT_PID" 2>/dev/null || true
            sleep 1
          fi
          systemctl start quantprism
          sleep 10

          # Dump logs for visibility
          echo "=== journalctl last 20 lines ==="
          journalctl -u quantprism -n 20 --no-pager || true

          # Internal health check
          echo "=== curl localhost:8000 ==="
          curl -s --max-time 5 http://127.0.0.1:8000/ -o /dev/null -w "status: %{http_code}" 2>&1 || echo "CURL_FAILED"

          systemctl is-active --quiet quantprism && echo "Deploy OK" || \
            (systemctl status quantprism --no-pager; journalctl -u quantprism -n 50 --no-pager; exit 1)
          ENDSSH
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          IBKR_BACKEND_SECRET: ${{ secrets.IBKR_BACKEND_SECRET }}
