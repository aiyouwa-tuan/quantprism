name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync app files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "app/,requirements.txt,scripts/,deploy/"
          target: "/opt/quant/Quant/"
          strip_components: 0

      - name: Configure env and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: SUPABASE_DATABASE_URL,DEEPSEEK_API_KEY,IBKR_BACKEND_SECRET
          script: |
            set -e
            cd /opt/quant/Quant

            # Fix ownership
            chown -R www-data:www-data app/ requirements.txt scripts/ 2>/dev/null || true
            chmod +x scripts/run_prod.sh

            # 同步 systemd service（使用 EnvironmentFile 读取 .env，不再硬编码 DATABASE_URL）
            if ! diff -q deploy/systemd/quantprism.service /etc/systemd/system/quantprism.service > /dev/null 2>&1; then
              cp deploy/systemd/quantprism.service /etc/systemd/system/quantprism.service
              systemctl daemon-reload
              echo "✅ systemd service updated"
            fi

            # === 注入 Supabase DATABASE_URL（如已配置该 secret）===
            if [ -n "$SUPABASE_DATABASE_URL" ]; then
              if grep -q "^DATABASE_URL=" .env 2>/dev/null; then
                sed -i "s|^DATABASE_URL=.*|DATABASE_URL=$SUPABASE_DATABASE_URL|" .env
              else
                echo "DATABASE_URL=$SUPABASE_DATABASE_URL" >> .env
              fi
              echo "✅ Supabase DATABASE_URL configured"
            fi

            # 同步其他可选 secret
            if [ -n "$DEEPSEEK_API_KEY" ]; then
              grep -q "^DEEPSEEK_API_KEY=" .env 2>/dev/null && \
                sed -i "s|^DEEPSEEK_API_KEY=.*|DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY|" .env || \
                echo "DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY" >> .env
            fi
            if [ -n "$IBKR_BACKEND_SECRET" ]; then
              grep -q "^IBKR_BACKEND_SECRET=" .env 2>/dev/null && \
                sed -i "s|^IBKR_BACKEND_SECRET=.*|IBKR_BACKEND_SECRET=$IBKR_BACKEND_SECRET|" .env || \
                echo "IBKR_BACKEND_SECRET=$IBKR_BACKEND_SECRET" >> .env
            fi

            # Install any new dependencies
            venv/bin/pip install -q -r requirements.txt 2>/dev/null || true

            # Restart
            systemctl restart quantprism
            sleep 5
            systemctl is-active --quiet quantprism && echo "✅ Deploy OK" || \
              (systemctl status quantprism --no-pager && exit 1)
