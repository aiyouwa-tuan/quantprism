name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync app files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "app/,requirements.txt,scripts/,deploy/"
          target: "/opt/quant/Quant/"
          strip_components: 0

      - name: Configure env and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: SUPABASE_DATABASE_URL,DEEPSEEK_API_KEY,IBKR_BACKEND_SECRET
          script: |
            set -e
            cd /opt/quant/Quant

            # Fix ownership
            chown -R www-data:www-data app/ requirements.txt scripts/ 2>/dev/null || true
            chmod +x scripts/run_prod.sh

            # 同步 systemd service（EnvironmentFile 模式，读取 .env）
            if ! diff -q deploy/systemd/quantprism.service /etc/systemd/system/quantprism.service > /dev/null 2>&1; then
              cp deploy/systemd/quantprism.service /etc/systemd/system/quantprism.service
              systemctl daemon-reload
              echo "✅ systemd service updated"
            fi

            # Install dependencies (including psycopg2-binary for Supabase)
            venv/bin/pip install -q -r requirements.txt

            # === 注入 Supabase DATABASE_URL 并做连接预检 ===
            if [ -n "$SUPABASE_DATABASE_URL" ]; then
              # 先测试连接，避免写错 URL 导致 VPS 启动失败
              if venv/bin/python3 -c "import sqlalchemy,sys; e=sqlalchemy.create_engine('$SUPABASE_DATABASE_URL',connect_args={'connect_timeout':10}); c=e.connect(); c.execute(sqlalchemy.text('SELECT 1')); c.close(); print('SUPABASE_OK')" 2>/tmp/supabase_test.log; then
                # 连接成功，写入 .env
                if grep -q "^DATABASE_URL=" .env 2>/dev/null; then
                  sed -i "s|^DATABASE_URL=.*|DATABASE_URL=$SUPABASE_DATABASE_URL|" .env
                else
                  echo "DATABASE_URL=$SUPABASE_DATABASE_URL" >> .env
                fi
                echo "✅ Supabase 连接成功，DATABASE_URL 已更新"
              else
                echo "⚠️ Supabase 连接测试失败，保持 SQLite（详情见 /tmp/supabase_test.log）"
                cat /tmp/supabase_test.log || true
              fi
            fi

            # 同步其他可选 secret
            if [ -n "$DEEPSEEK_API_KEY" ]; then
              grep -q "^DEEPSEEK_API_KEY=" .env 2>/dev/null && \
                sed -i "s|^DEEPSEEK_API_KEY=.*|DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY|" .env || \
                echo "DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY" >> .env
            fi
            if [ -n "$IBKR_BACKEND_SECRET" ]; then
              grep -q "^IBKR_BACKEND_SECRET=" .env 2>/dev/null && \
                sed -i "s|^IBKR_BACKEND_SECRET=.*|IBKR_BACKEND_SECRET=$IBKR_BACKEND_SECRET|" .env || \
                echo "IBKR_BACKEND_SECRET=$IBKR_BACKEND_SECRET" >> .env
            fi

            # Quick startup sanity check before systemd restart
            echo "=== App import test ==="
            sudo -u www-data bash -c 'cd /opt/quant/Quant/app && /opt/quant/Quant/venv/bin/python3 -c "import main; print(\"IMPORT_OK\")"' 2>&1 || true

            # Restart
            systemctl restart quantprism
            sleep 8

            # Always dump recent logs for visibility
            echo "=== journalctl last 30 lines ==="
            journalctl -u quantprism -n 30 --no-pager || true

            systemctl is-active --quiet quantprism && echo "✅ Deploy OK" || \
              (systemctl status quantprism --no-pager; exit 1)
