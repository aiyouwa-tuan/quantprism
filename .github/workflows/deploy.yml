name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync app files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "app/,requirements.txt,scripts/,deploy/"
          target: "/opt/quant/Quant/"
          strip_components: 0

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 22 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connectivity
        run: |
          echo "Testing SSH with verbose output..."
          ssh -v -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            root@${{ secrets.VPS_HOST }} \
            'echo SSH_OK' 2>&1 || true
          echo "SSH test exit: $?"

      - name: Sync secrets to VPS .env
        env:
          LONGPORT_APP_KEY: ${{ secrets.LONGPORT_APP_KEY }}
          LONGPORT_APP_SECRET: ${{ secrets.LONGPORT_APP_SECRET }}
          LONGPORT_ACCESS_TOKEN: ${{ secrets.LONGPORT_ACCESS_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            root@${{ secrets.VPS_HOST }} \
            "set -e
             ENV_FILE=/opt/quant/Quant/.env
             touch \$ENV_FILE
             # 移除旧的 LONGPORT_* 行，再追加新值
             sed -i '/^LONGPORT_/d' \$ENV_FILE
             printf '\nLONGPORT_APP_KEY=%s\nLONGPORT_APP_SECRET=%s\nLONGPORT_ACCESS_TOKEN=%s\n' '$LONGPORT_APP_KEY' '$LONGPORT_APP_SECRET' '$LONGPORT_ACCESS_TOKEN' >> \$ENV_FILE
             chmod 600 \$ENV_FILE
             chown www-data:www-data \$ENV_FILE"

      - name: Run remote deploy script
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=10 \
            root@${{ secrets.VPS_HOST }} \
            'chmod +x /opt/quant/Quant/scripts/remote_deploy.sh && /opt/quant/Quant/scripts/remote_deploy.sh'
