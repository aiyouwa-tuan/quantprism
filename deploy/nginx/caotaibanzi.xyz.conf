upstream quantprism_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name caotaibanzi.xyz www.caotaibanzi.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://caotaibanzi.xyz$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name caotaibanzi.xyz;

    ssl_certificate /etc/letsencrypt/live/caotaibanzi.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/caotaibanzi.xyz/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:QuantPrismSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20m;

    location /static/ {
        alias /opt/quant/Quant/app/static/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://quantprism_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 180s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.caotaibanzi.xyz;

    ssl_certificate /etc/letsencrypt/live/caotaibanzi.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/caotaibanzi.xyz/privkey.pem;

    location / {
        return 301 https://caotaibanzi.xyz$request_uri;
    }
}
