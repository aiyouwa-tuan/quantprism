<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading OS</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0a0e1a', 800: '#111827', 700: '#1a2035', 600: '#232b3e', 500: '#2d3650' },
                        accent: { green: '#22c55e', red: '#ef4444', blue: '#3b82f6', yellow: '#eab308' },
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0a0e1a; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: block; }
        .htmx-request .htmx-hide-on-request { opacity: 0.4; pointer-events: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #2d3650; border-radius: 3px; }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex">

    <!-- 左侧导航 -->
    <nav class="w-44 bg-dark-800 border-r border-dark-600 flex flex-col py-4 px-3 gap-0.5 fixed h-full z-10">
        <a href="/" class="text-lg font-bold text-white px-3 mb-6">Trading OS</a>

        <a href="/" class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm {{ 'bg-dark-500 text-white' if request and (request.url.path == '/' or '/screener' in request.url.path or '/diagnose' in request.url.path or '/strategies' in request.url.path) else 'text-gray-400 hover:text-white hover:bg-dark-700' }}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            交易机会
        </a>

        <a href="/positions" class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm {{ 'bg-dark-500 text-white' if request and '/positions' == request.url.path else 'text-gray-400 hover:text-white hover:bg-dark-700' }}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
            我的持仓
        </a>

        <a href="/strategies/manage" class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm {{ 'bg-dark-500 text-white' if request and '/strategies' in request.url.path else 'text-gray-400 hover:text-white hover:bg-dark-700' }}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
            策略
        </a>

        <a href="/history" class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm {{ 'bg-dark-500 text-white' if request and '/history' in request.url.path else 'text-gray-400 hover:text-white hover:bg-dark-700' }}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            交易记录
        </a>

        <div class="flex-1"></div>

        <a href="/settings" class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm {{ 'bg-dark-500 text-white' if request and '/settings' in request.url.path else 'text-gray-400 hover:text-white hover:bg-dark-700' }}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            设置
        </a>
    </nav>

    <!-- 主内容区 -->
    <main class="ml-44 flex-1 p-6 min-h-screen">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
