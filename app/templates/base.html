<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantPrism</title>
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/htmx.min.js" integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/static/tailwind.min.css">
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="/static/qp-animations.css">
    <link rel="stylesheet" href="/static/qp-linear.css">
    <style>
        body { background: #f6f9fc; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: block; }
        .htmx-indicator.htmx-request { display: block; }
        .htmx-request .htmx-hide-on-request { opacity: 0.4; pointer-events: none; }
        .qp-logo {
            background: linear-gradient(135deg, #635bff 0%, #00d4ff 100%);
            box-shadow: 0 3px 10px rgba(99,106,210,0.35);
            color: #fff !important;
        }
        .qp-nav-active {
            background-color: #eef4ff !important;
            color: #635bff !important;
            font-weight: 600 !important;
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex flex-col">

    <div class="flex flex-1">
    <!-- 左侧导航 -->
    {% set _path = request.url.path if request else '' %}
    <nav style="width:232px; background:#ffffff; border-right:1px solid #e3e8ee; position:fixed; height:100%; z-index:10; overflow-y:auto; display:flex; flex-direction:column; padding:22px 14px;" class="hidden md:flex">

        <a href="/goals" style="display:flex; align-items:center; gap:10px; padding:0 10px; margin-bottom:24px; text-decoration:none;">
            <div class="qp-logo" style="width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex-shrink:0;">Q</div>
            <span style="font-size:16px; font-weight:700; color:#0a2540; letter-spacing:-0.3px;">QuantPrism</span>
        </a>

        <div class="qp-nav-section" style="margin-top:4px;">概览</div>
        <a href="/goals" class="qp-nav-link {{ 'qp-nav-active' if _path in ('/goals','/portfolio','/') else '' }}"><span class="qp-ic">▦</span>今日仪表盘</a>

        <div class="qp-nav-section">策略</div>
        <a href="/hunt" class="qp-nav-link {{ 'qp-nav-active' if '/hunt' in _path else '' }}"><span class="qp-ic">◈</span>策略猎手</a>
        <a href="/backtest" class="qp-nav-link {{ 'qp-nav-active' if _path == '/backtest' else '' }}"><span class="qp-ic">⚗</span>回测实验室</a>
        <a href="/backtest/tasks" class="qp-nav-link qp-nav-sub {{ 'qp-nav-active' if '/backtest/tasks' in _path else '' }}">任务中心</a>

        <div class="qp-nav-section">市场</div>
        <a href="/scan" class="qp-nav-link {{ 'qp-nav-active' if '/scan' in _path else '' }}"><span class="qp-ic">⊙</span>标的扫描</a>
        <a href="/macro" class="qp-nav-link {{ 'qp-nav-active' if '/macro' in _path else '' }}"><span class="qp-ic">◉</span>宏观经济</a>
        <a href="/sentiment" class="qp-nav-link {{ 'qp-nav-active' if '/sentiment' in _path else '' }}"><span class="qp-ic">☀</span>情绪温度计</a>
        <a href="/jige-advisor" class="qp-nav-link {{ 'qp-nav-active' if '/jige-advisor' in _path else '' }}"><span class="qp-ic">✦</span>鸡哥顾问</a>
        <a href="/jin-view" class="qp-nav-link {{ 'qp-nav-active' if '/jin-view' in _path else '' }}"><span class="qp-ic">✺</span>鸡哥视角</a>
        <a href="/technical" class="qp-nav-link {{ 'qp-nav-active' if '/technical' in _path else '' }}"><span class="qp-ic">▲</span>技术分析</a>

        <div class="qp-nav-section">交易</div>
        <a href="/portfolio" class="qp-nav-link {{ 'qp-nav-active' if _path == '/portfolio' else '' }}"><span class="qp-ic">◆</span>持仓管理</a>
        <a href="/watchlist" class="qp-nav-link {{ 'qp-nav-active' if '/watchlist' in _path else '' }}"><span class="qp-ic">○</span>观察列表</a>
        <a href="/risk" class="qp-nav-link {{ 'qp-nav-active' if _path == '/risk' else '' }}"><span class="qp-ic">⛨</span>风控护盾</a>

        <div style="flex:1;"></div>
        <div class="qp-nav-section">系统</div>
        <a href="/settings" class="qp-nav-link {{ 'qp-nav-active' if '/settings' in _path else '' }}"><span class="qp-ic">⚙</span>系统配置</a>
    </nav>

    <!-- 主内容区 -->
    <main class="qp-main-content flex-1 min-h-screen flex flex-col">
        <!-- 顶部状态栏 -->
        <div class="qp-topbar">
            <div id="vix-indicator" style="font-size:12.5px; color:#697386; font-weight:500;">
                VIX: <span class="font-mono" style="font-family:'JetBrains Mono',ui-monospace,monospace; font-weight:700;">--</span>
            </div>
            <span id="account-type-badge" style="padding:3px 10px; border-radius:6px; font-size:11px; font-weight:700; background:#eef4ff; color:#635bff; border:1px solid #d9e6ff; letter-spacing:0.05em; display:none;"></span>
        </div>

        <div class="qp-page-wrap">
            <!-- 移动端提示 -->
            <div class="block md:hidden" style="background:#ffffff; border:1px solid #e3e8ee; border-radius:10px; padding:14px; margin-bottom:16px; font-size:12.5px; color:#697386; text-align:center; box-shadow:0 1px 2px rgba(10,37,64,0.04);">
                QuantPrism 在桌面端体验最佳
            </div>
            {% block content %}{% endblock %}
        </div>
    </main>
    </div>

    <script src="/static/qp-core.js"></script>
    <script>
    (function() {
        function refreshVix() {
            fetch('/api/vix').then(function(r) { return r.json(); }).then(function(d) {
                var el = document.querySelector('#vix-indicator span');
                if (el && d.price) {
                    el.textContent = d.price.toFixed(2);
                    el.style.color = d.price > 30 ? '#f87171' : d.price > 20 ? '#facc15' : '#4ade80';
                }
            }).catch(function(){});
        }
        refreshVix();
        setInterval(refreshVix, 60000);

        fetch('/api/account-type').then(function(r){return r.json();}).then(function(d){
            var badge = document.getElementById('account-type-badge');
            if (!badge) return;
            if (d.type === 'paper') {
                badge.textContent = 'PAPER';
                badge.style.background = 'rgba(94,106,210,0.15)';
                badge.style.color = '#7170ff';
                badge.style.border = '1px solid rgba(113,112,255,0.25)';
                badge.style.display = '';
            } else if (d.type === 'live') {
                badge.textContent = 'LIVE';
                badge.style.background = 'rgba(16,185,129,0.15)';
                badge.style.color = '#34d399';
                badge.style.border = '1px solid rgba(16,185,129,0.25)';
                badge.style.display = '';
            }
            // unknown: badge stays hidden
        }).catch(function(){});
    })();
    </script>
</body>
</html>
