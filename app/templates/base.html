<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantPrism</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0a0e1a', 800: '#111827', 700: '#1a2035', 600: '#232b3e', 500: '#2d3650' },
                        accent: { green: '#22c55e', red: '#ef4444', blue: '#3b82f6', yellow: '#eab308' },
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0a0e1a; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: block; }
        .htmx-request .htmx-hide-on-request { opacity: 0.4; pointer-events: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #2d3650; border-radius: 3px; }
        .qp-logo { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex flex-col">

    <!-- Paper mode 顶部指示条 -->
    <div style="height: 3px; background: linear-gradient(90deg, #f97316, #fb923c, #f97316); flex-shrink: 0;"></div>

    <div class="flex flex-1">
    <!-- 左侧导航 -->
    <nav class="w-48 bg-dark-800 border-r border-dark-600 flex flex-col py-4 px-3 gap-0.5 fixed h-full z-10">
        <div class="flex items-center gap-2 px-3 mb-6">
            <div class="qp-logo w-7 h-7 rounded-lg flex items-center justify-center text-white font-bold text-xs">QP</div>
            <span class="text-lg font-bold text-white">QuantPrism</span>
        </div>

        <a href="/goals" class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm {{ 'bg-dark-500 text-white' if request and (request.url.path == '/goals' or request.url.path == '/portfolio') else 'text-gray-400 hover:text-white hover:bg-dark-700' }}">
            <span class="text-base">&#x1F3AF;</span>
            设定目标
        </a>

        <a href="/hunt" class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm {{ 'bg-dark-500 text-white' if request and '/hunt' in request.url.path else 'text-gray-400 hover:text-white hover:bg-dark-700' }}">
            <span class="text-base">&#x1F50D;</span>
            策略猎手
        </a>

        <a href="/backtest" class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm {{ 'bg-dark-500 text-white' if request and request.url.path == '/backtest' else 'text-gray-400 hover:text-white hover:bg-dark-700' }}">
            <span class="text-base">&#x1F9EA;</span>
            回测实验室
        </a>

        <a href="/scan" class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm {{ 'bg-dark-500 text-white' if request and '/scan' in request.url.path else 'text-gray-400 hover:text-white hover:bg-dark-700' }}">
            <span class="text-base">&#x1F4E1;</span>
            标的扫描
        </a>

        <a href="/risk" class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm {{ 'bg-dark-500 text-white' if request and '/risk' in request.url.path else 'text-gray-400 hover:text-white hover:bg-dark-700' }}">
            <span class="text-base">&#x1F6E1;</span>
            风控护盾
        </a>

        <a href="/watchlist" class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm {{ 'bg-dark-500 text-white' if request and '/watchlist' in request.url.path else 'text-gray-400 hover:text-white hover:bg-dark-700' }}">
            <span class="text-base">&#x1F441;</span>
            观察列表
        </a>

        <a href="/macro" class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm {{ 'bg-dark-500 text-white' if request and '/macro' in request.url.path else 'text-gray-400 hover:text-white hover:bg-dark-700' }}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            宏观经济
        </a>

        <div class="flex-1"></div>

        <a href="/settings" class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm {{ 'bg-dark-500 text-white' if request and '/settings' in request.url.path else 'text-gray-400 hover:text-white hover:bg-dark-700' }}">
            <span class="text-base">&#x2699;</span>
            系统配置
        </a>
    </nav>

    <!-- 主内容区 -->
    <main class="ml-48 flex-1 min-h-screen flex flex-col">
        <!-- 顶部栏：PAPER 模式 + VIX -->
        <div class="flex items-center justify-end gap-3 px-6 py-2 border-b border-dark-600 bg-dark-800/50">
            <div id="vix-indicator" class="text-xs text-gray-400">
                VIX: <span class="text-accent-yellow font-mono">--</span>
            </div>
            <span class="px-2 py-0.5 rounded text-xs font-semibold bg-orange-500/20 text-orange-400 border border-orange-500/30">PAPER</span>
        </div>

        <div class="flex-1 p-6">
            <!-- 移动端提示（仅小屏显示） -->
            <div class="block md:hidden bg-dark-700 border border-dark-600 rounded-lg p-3 mb-4 text-xs text-gray-400 text-center">
                QuantPrism 在桌面端体验最佳，当前屏幕宽度可能影响显示效果
            </div>
            {% block content %}{% endblock %}
        </div>
    </main>
    </div>

</body>
</html>
