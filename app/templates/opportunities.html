{% extends "base.html" %}
{% block content %}
<div class="flex justify-between items-center mb-6">
    <div>
        <h1 class="text-xl font-bold text-white">交易机会</h1>
        <p class="text-sm text-gray-500 mt-1">AI 筛选高评分标的，查看支撑位和期权链</p>
    </div>
    <div class="flex items-center gap-3">
        {% if regime %}
        <div class="flex items-center gap-2 bg-dark-700 border border-dark-600 rounded-lg px-4 py-2">
            <span class="w-2.5 h-2.5 rounded-full {{ 'bg-accent-green' if regime.regime in ['low_vol', 'normal'] else 'bg-accent-yellow' if regime.regime == 'mid_vol' else 'bg-accent-red' }}"></span>
            <span class="text-sm text-gray-300">VIX {{ regime.vix }} · {{ regime.description }}</span>
        </div>
        {% endif %}
    </div>
</div>

<!-- 板块选择 -->
<div class="flex gap-2 mb-6">
    {% for key, sec in sectors.items() %}
    <button hx-post="/screener/scan" hx-target="#results" hx-swap="innerHTML"
            hx-vals='{"sector": "{{ key }}"}'
            class="px-4 py-2 rounded-lg text-sm font-medium transition
            {{ 'bg-accent-green text-dark-900' if key == current_sector else 'bg-dark-700 border border-dark-600 text-gray-300 hover:border-gray-500' }}">
        {{ sec.name }} <span class="text-xs opacity-70">{{ sec.symbols|length }}</span>
    </button>
    {% endfor %}
</div>

<!-- 结果 -->
<div id="results">
    <div hx-post="/screener/scan" hx-target="#results" hx-swap="innerHTML"
         hx-trigger="load" hx-vals='{"sector": "{{ current_sector }}"}'>
        <div class="text-center py-16">
            <div class="inline-block w-8 h-8 border-2 border-accent-green border-t-transparent rounded-full animate-spin mb-4"></div>
            <div class="text-white">正在分析 {{ sectors[current_sector].name }} 板块...</div>
            <div class="text-sm text-gray-500 mt-2">对每只标的进行趋势判定、支撑位推演、波动率分析</div>
        </div>
    </div>
</div>
{% endblock %}
