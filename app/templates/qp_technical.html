{% extends "base.html" %}
{% block content %}
<style>
.ta-card { background:#111214; border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:16px; }
.ta-badge { display:inline-flex; align-items:center; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:700; }
.ta-buy    { background:rgba(34,197,94,0.15);  color:#4ade80; border:1px solid rgba(34,197,94,0.3); }
.ta-sell   { background:rgba(239,68,68,0.15);  color:#f87171; border:1px solid rgba(239,68,68,0.3); }
.ta-watch  { background:rgba(148,163,184,0.1); color:#94a3b8; border:1px solid rgba(148,163,184,0.2); }
.ta-warn   { background:rgba(234,179,8,0.15);  color:#facc15; border:1px solid rgba(234,179,8,0.3); }
.ta-row    { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
.ta-row:last-child { border-bottom:none; }
.lv-bar-bg  { background:rgba(255,255,255,0.06); height:4px; border-radius:99px; overflow:hidden; }
.lv-bar-fill { height:100%; border-radius:99px; }
</style>

<!-- 页头 -->
<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;">
    <div>
        <h1 style="font-size:20px; font-weight:650; color:#f7f8f8; letter-spacing:-0.4px;">
            📐 技术分析信号
        </h1>
        <p style="font-size:13px; color:#62666d; margin-top:4px;">
            支撑阻力 · 海龟系统 · 量价背离 — 10 标的全扫描
        </p>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
        <span style="font-size:12px; color:#62666d;">更新：<span id="ta-update-time">--</span></span>
        <button onclick="refreshTA()" id="ta-refresh-btn"
            style="padding:7px 14px; background:rgba(94,106,210,0.15); border:1px solid rgba(94,106,210,0.3); border-radius:6px; color:#7170ff; font-size:12px; cursor:pointer; font-weight:600;">
            ↻ 刷新
        </button>
    </div>
</div>

<!-- 加载状态 -->
<div id="ta-loading" style="text-align:center; padding:60px 0; color:#62666d; display:none;">
    <div style="font-size:24px; margin-bottom:10px;">⏳</div>
    <div>正在从 VPS 拉取数据并计算…</div>
</div>

<!-- 主表格 -->
<div id="ta-grid" style="display:flex; flex-direction:column; gap:10px;"></div>

<script>
function turtleBadge(rec) {
    const map = {
        '买入':     ['ta-badge ta-buy',  '▲ 买入'],
        '试探买入': ['ta-badge ta-buy',  '▲ 试探'],
        '止盈出场': ['ta-badge ta-sell', '▼ 出场'],
        '减仓':     ['ta-badge ta-sell', '▼ 减仓'],
        '观望':     ['ta-badge ta-watch','— 观望'],
    };
    const [cls, label] = map[rec] || ['ta-badge ta-watch', rec];
    return `<span class="${cls}">${label}</span>`;
}

function divBadge(overall, strength) {
    if (strength === '无') return '<span class="ta-badge ta-watch">无信号</span>';
    if (overall.includes('顶部') && strength === '强') return '<span class="ta-badge ta-sell">⚠️ 强顶背离</span>';
    if (overall.includes('顶部')) return '<span class="ta-badge ta-warn">⚠️ 顶部背离</span>';
    if (overall.includes('底部') && strength === '强') return '<span class="ta-badge ta-buy">底部背离</span>';
    if (overall.includes('底部')) return '<span class="ta-badge ta-watch">底部参考</span>';
    return '<span class="ta-badge ta-watch">—</span>';
}

function pctBar(pct, color) {
    const w = Math.min(Math.abs(pct || 0) * 6, 100);
    return `<div class="lv-bar-bg" style="width:60px; display:inline-block; vertical-align:middle; margin-left:4px;">
        <div class="lv-bar-fill" style="width:${w}%; background:${color};"></div>
    </div>`;
}

function renderRow(d) {
    const sr  = d.support_resistance || {};
    const trt = d.turtle || {};
    const div = d.divergence || {};

    if (d.error) {
        return `<div class="ta-card" style="color:#f87171;">${d.symbol}: ${d.error}</div>`;
    }

    const suppDistHtml = sr.nearest_support
        ? `<span style="color:#4ade80; font-size:12px;">$${sr.nearest_support}</span>
           <span style="color:#3e3e44; font-size:11px; margin-left:4px;">-${sr.support_distance_pct}%${pctBar(sr.support_distance_pct,'#4ade80')}</span>`
        : '<span style="color:#3e3e44;">—</span>';

    const resDistHtml = sr.nearest_resistance
        ? `<span style="color:#f87171; font-size:12px;">$${sr.nearest_resistance}</span>
           <span style="color:#3e3e44; font-size:11px; margin-left:4px;">+${sr.resistance_distance_pct}%${pctBar(sr.resistance_distance_pct,'#f87171')}</span>`
        : '<span style="color:#3e3e44;">—</span>';

    return `
    <div class="ta-card">
        <div style="display:grid; grid-template-columns:80px 1fr 1fr 1fr 1fr; align-items:center; gap:12px;">

            <!-- 标的名 + 价格 -->
            <div>
                <div style="font-size:14px; font-weight:700; color:#f7f8f8;">${d.symbol}</div>
                <div style="font-size:13px; color:#62666d; margin-top:2px;">$${d.price}</div>
            </div>

            <!-- 支撑位 -->
            <div>
                <div style="font-size:10px; color:#3e3e44; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px;">最近支撑</div>
                ${suppDistHtml}
            </div>

            <!-- 阻力位 -->
            <div>
                <div style="font-size:10px; color:#3e3e44; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px;">最近阻力</div>
                ${resDistHtml}
            </div>

            <!-- 海龟信号 -->
            <div>
                <div style="font-size:10px; color:#3e3e44; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;">海龟系统</div>
                ${turtleBadge(trt.recommendation)}
                <div style="font-size:11px; color:#3e3e44; margin-top:4px; line-height:1.4; max-width:160px;">${trt.detail || ''}</div>
            </div>

            <!-- 量价背离 -->
            <div>
                <div style="font-size:10px; color:#3e3e44; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;">量价背离</div>
                ${divBadge(div.overall || '', div.strength || '无')}
                <div style="font-size:11px; color:#3e3e44; margin-top:4px; line-height:1.4;">${div.overall || ''}</div>
            </div>
        </div>
    </div>`;
}

async function loadTA(showLoading) {
    if (showLoading) {
        document.getElementById('ta-loading').style.display = 'block';
        document.getElementById('ta-grid').style.opacity = '0.3';
    }
    try {
        const r = await fetch('/api/ta/summary');
        const data = await r.json();
        document.getElementById('ta-grid').innerHTML = data.map(renderRow).join('');
        document.getElementById('ta-update-time').textContent =
            new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
    } catch(e) {
        document.getElementById('ta-grid').innerHTML =
            `<div style="color:#f87171; padding:20px;">加载失败：${e.message}</div>`;
    } finally {
        document.getElementById('ta-loading').style.display = 'none';
        document.getElementById('ta-grid').style.opacity = '1';
    }
}

function refreshTA() {
    const btn = document.getElementById('ta-refresh-btn');
    btn.textContent = '↻ 刷新中…'; btn.disabled = true;
    fetch('/api/ta/refresh', {method:'POST'})
        .finally(() => loadTA(false).finally(() => {
            btn.textContent = '↻ 刷新'; btn.disabled = false;
        }));
}

loadTA(true);
</script>
{% endblock %}
