{% extends "base.html" %}
{% block content %}
<style>
.jin-card { background:#ffffff; border:1px solid #e3e8ee; border-radius:12px; padding:18px; transition:all 0.2s; cursor:pointer; box-shadow:0 1px 2px rgba(10,37,64,0.04); }
.jin-card:hover { border-color:#635bff; transform:translateY(-1px); box-shadow:0 6px 20px rgba(99,91,255,0.12); }
.jin-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:6px; font-size:11.5px; font-weight:600; letter-spacing:0.02em; }
.jin-badge-yellow { background:#fef3c7; color:#b45309; }
.jin-badge-red    { background:#fef1f2; color:#b42318; }
.jin-badge-green  { background:#e6faf0; color:#067647; }
.jin-badge-neutral{ background:#f2f4f7; color:#475467; }
.jin-progress-bg { background:#eef4ff; border-radius:99px; height:5px; overflow:hidden; }
.jin-progress-fill { height:100%; border-radius:99px; transition:width 0.4s ease; }
.tier-card { background:#ffffff; border:1px solid #e3e8ee; border-radius:10px; padding:14px 16px; box-shadow:0 1px 2px rgba(10,37,64,0.04); }
/* 卖点分析 */
.sell-btn { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:6px; font-size:11px; font-weight:600; border:1px solid #fca5a5; background:#fef2f2; color:#b42318; cursor:pointer; transition:all 0.15s; }
.sell-btn:hover { background:#fee2e2; }
.sell-panel { background:#fef2f2; border:1px solid #fca5a5; border-radius:8px; padding:12px 14px; margin-top:10px; font-size:12px; display:none; color:#7f1d1d; }
.sell-panel.active { display:block; }
.verdict-pill { display:inline-block; padding:3px 9px; border-radius:5px; font-size:11px; font-weight:700; letter-spacing:0.02em; }
.verdict-EXIT   { background:#fef1f2; color:#b42318; }
.verdict-REDUCE { background:#fff7ed; color:#c2410c; }
.verdict-WATCH  { background:#fef3c7; color:#b45309; }
.verdict-HOLD   { background:#e6faf0; color:#067647; }
.conflict-tag { background:#fef1f2; border:1px solid #fca5a5; border-radius:5px; padding:2px 7px; color:#b42318; font-size:11px; }
</style>

<!-- 页头 -->
<div class="qp-page-head">
    <div>
        <div class="qp-crumb">市场 / 鸡哥视角</div>
        <h1>🏮 鸡哥视角</h1>
        <div class="qp-subtitle">道 → 势 → 法 → 术 · 美股科技 9 标的结构化操作建议</div>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
        <span class="qp-chip">更新于 <span id="jin-update-time" style="color:#0a2540; font-weight:600; margin-left:4px;">--</span></span>
        <button onclick="refreshJin()" id="jin-refresh-btn" class="qp-btn-ghost">↻ 刷新</button>
    </div>
</div>

<!-- 道的判断 -->
<div style="background:linear-gradient(135deg,#ecfdf5,#f0fdfa); border:1px solid #a7f3d0; border-radius:12px; padding:14px 20px; margin-bottom:20px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; box-shadow:0 1px 2px rgba(10,37,64,0.04);">
    <span style="font-size:14px; font-weight:700; color:#065f46;">✅ 道：美股科技</span>
    <span style="font-size:12.5px; color:#047857;">规则透明 · 信息充分 · AI 不可逆 · 长期确定性高</span>
    <span style="margin-left:auto; font-size:12.5px; color:#697386; font-weight:500;">A 股 ❌ &nbsp;|&nbsp; 中概股 ⚠️</span>
</div>

<!-- 加载状态 -->
<div id="jin-loading" style="text-align:center; padding:60px 0; color:#697386; display:none;">
    <div style="font-size:24px; margin-bottom:12px;">⏳</div>
    <div style="font-size:14px;">正在拉取实时数据…</div>
</div>

<!-- 标的卡片网格 -->
<div id="jin-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:14px; margin-bottom:28px;">
    <!-- 由 JS 填充 -->
</div>

<!-- 仓位结构建议 -->
<div style="margin-top:8px;">
    <h3 style="font-size:14px; font-weight:600; color:#8a8f98; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:12px;">杠铃仓位结构</h3>
    <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:10px;" id="tier-grid">
        <!-- 由 JS 填充 -->
    </div>
</div>

<script>
const MOAT = {
    NVDA:  { stars: 5, reason: 'AI训练芯片94%市占率' },
    TSM:   { stars: 5, reason: '高端芯片代工70%市占率' },
    GOOGL: { stars: 5, reason: '搜索92%市占率' },
    META:  { stars: 4, reason: '社交+AI广告闭环' },
    MSFT:  { stars: 4, reason: '企业软件+Azure' },
    AMZN:  { stars: 4, reason: 'AWS第一+电商' },
    AAPL:  { stars: 4, reason: '消费电子生态' },
    TSLA:  { stars: 2, reason: '马斯克精力分散' },
    QQQ:   { stars: 5, reason: '纳指100宽基首选' },
};

const TIERS = [
    { label: '进取型', emoji: '🚀', symbols: ['NVDA','META','GOOGL','TSM'], desc: '科技成长，博超额收益' },
    { label: '稳健型', emoji: '⚖️', symbols: ['QQQ','AMZN','AAPL'], desc: '宽基+消费，跟随市场Beta' },
    { label: '防守型', emoji: '🛡️', symbols: ['MSFT'], desc: '安全垫，现金流资产' },
];

const BADGE_CLASSES = {
    yellow:  'jin-badge-yellow',
    red:     'jin-badge-red',
    green:   'jin-badge-green',
    neutral: 'jin-badge-neutral',
};

let _stockData = [];

function stars(n) {
    return '★'.repeat(n) + '☆'.repeat(5 - n);
}

function progressColor(pct) {
    if (pct > 85) return '#b42318';
    if (pct > 60) return '#b45309';
    return '#067647';
}

function pctColor(v) {
    return v > 0 ? '#067647' : v < 0 ? '#b42318' : '#697386';
}

function renderCard(d) {
    const sig = d.signal;
    const badgeClass = BADGE_CLASSES[sig.level] || 'jin-badge-neutral';
    const moat = MOAT[d.symbol] || { stars: 3 };
    const pctColor52 = progressColor(d.pct_in_52w_range);

    let zonesHtml = '';
    const z = sig.zones || {};
    if (z.sell)  zonesHtml += `<span style="font-size:11px; color:#697386;">减仓目标 <b style="color:#b42318;">$${z.sell}</b></span>`;
    if (z.rebuy) zonesHtml += `<span style="font-size:11px; color:#697386; margin-left:10px;">回买参考 <b style="color:#067647;">$${z.rebuy}</b></span>`;
    if (z.watch) zonesHtml += `<span style="font-size:11px; color:#697386;">观察位 MA200 <b style="color:#b45309;">$${z.watch}</b></span>`;
    if (z.buy1)  zonesHtml += `<span style="font-size:11px; color:#697386;">建仓参考 <b style="color:#067647;">$${z.buy1}</b></span>`;
    if (z.add)   zonesHtml += `<span style="font-size:11px; color:#697386;">加仓参考 <b style="color:#067647;">$${z.add}</b></span>`;

    const changeAmt  = d.close - d.open;
    const changePct  = d.open > 0 ? ((changeAmt / d.open) * 100).toFixed(2) : '0.00';
    const changeSign = changeAmt >= 0 ? '+' : '';
    const changeClr  = changeAmt >= 0 ? '#067647' : '#b42318';

    return `
    <div class="jin-card" onclick="location.href='/jin-view/${d.symbol}'">
        <div style="display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px;">
            <div>
                <div style="font-size:15px; font-weight:700; color:#0a2540; letter-spacing:-0.2px;">${d.symbol}</div>
                <div style="font-size:20px; font-weight:700; color:#0a2540; margin-top:2px;">$${d.close.toLocaleString()}</div>
                <div style="font-size:12px; color:${changeClr}; margin-top:1px;">${changeSign}${changePct}%</div>
            </div>
            <div style="text-align:right;">
                <span class="jin-badge ${badgeClass}">${sig.emoji} ${sig.action}</span>
                <div style="font-size:12px; color:#f5c518; margin-top:6px;" title="${moat.reason}">${stars(moat.stars)}</div>
            </div>
        </div>

        <!-- MA 偏离 -->
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <div style="flex:1; background:rgba(255,255,255,0.04); border-radius:6px; padding:7px 10px;">
                <div style="font-size:10px; color:#697386; margin-bottom:2px;">vs MA50</div>
                <div style="font-size:13px; font-weight:600; color:${pctColor(d.pct_vs_ma50)};">${d.pct_vs_ma50 > 0 ? '+' : ''}${d.pct_vs_ma50}%</div>
                <div style="font-size:11px; color:#8a94a6;">$${d.ma50}</div>
            </div>
            <div style="flex:1; background:rgba(255,255,255,0.04); border-radius:6px; padding:7px 10px;">
                <div style="font-size:10px; color:#697386; margin-bottom:2px;">vs MA200</div>
                <div style="font-size:13px; font-weight:600; color:${pctColor(d.pct_vs_ma200)};">${d.pct_vs_ma200 > 0 ? '+' : ''}${d.pct_vs_ma200}%</div>
                <div style="font-size:11px; color:#8a94a6;">$${d.ma200}</div>
            </div>
        </div>

        <!-- 52周位置 -->
        <div style="margin-bottom:10px;">
            <div style="display:flex; justify-content:space-between; font-size:11px; color:#697386; margin-bottom:4px;">
                <span>52周位置</span>
                <span style="color:${pctColor52}; font-weight:600;">${d.pct_in_52w_range}%</span>
            </div>
            <div class="jin-progress-bg">
                <div class="jin-progress-fill" style="width:${d.pct_in_52w_range}%; background:${pctColor52};"></div>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:10px; color:#8a94a6; margin-top:3px;">
                <span>$${d.low_52w}</span>
                <span>$${d.high_52w}</span>
            </div>
        </div>

        <!-- 操作建议理由 -->
        <div style="font-size:11px; color:#697386; line-height:1.5; border-top:1px solid #f2f4f7; padding-top:9px; margin-top:2px;">
            ${sig.reason}
        </div>

        <!-- 价格区间 -->
        ${zonesHtml ? `<div style="margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;">${zonesHtml}</div>` : ''}

        <!-- 卖点分析按钮 -->
        <div style="margin-top:10px; border-top:1px solid #f2f4f7; padding-top:8px; display:flex; justify-content:flex-end;">
            <button class="sell-btn" onclick="event.stopPropagation(); runSellAnalysis('${d.symbol}', this)">
                📊 卖点分析
            </button>
        </div>
        <!-- 卖点分析结果面板 -->
        <div class="sell-panel" id="sell-panel-${d.symbol}"></div>
    </div>`;
}

function renderTiers(stockData) {
    const actionMap = {};
    stockData.forEach(d => { actionMap[d.symbol] = d.signal ? d.signal.action : '—'; });

    const grid = document.getElementById('tier-grid');
    grid.innerHTML = TIERS.map(t => {
        const tags = t.symbols.map(s => {
            const act = actionMap[s] || '—';
            return `<span style="font-size:12px; color:#697386; background:#f2f4f7; padding:2px 8px; border-radius:4px;">${s} · ${act}</span>`;
        }).join('');
        return `
        <div class="tier-card">
            <div style="font-size:13px; font-weight:600; color:#0a2540; margin-bottom:4px;">${t.emoji} ${t.label}</div>
            <div style="font-size:11px; color:#697386; margin-bottom:10px;">${t.desc}</div>
            <div style="display:flex; flex-wrap:wrap; gap:5px;">${tags}</div>
        </div>`;
    }).join('');
}

async function loadJin(showLoading) {
    if (showLoading) {
        document.getElementById('jin-loading').style.display = 'block';
        document.getElementById('jin-grid').style.opacity = '0.3';
    }
    try {
        const r = await fetch('/api/jin-view/summary');
        const data = await r.json();
        _stockData = data;

        document.getElementById('jin-grid').innerHTML = data.map(renderCard).join('');
        document.getElementById('jin-grid').style.opacity = '1';
        renderTiers(data);
        document.getElementById('jin-update-time').textContent = new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
    } catch(e) {
        document.getElementById('jin-grid').innerHTML = '<div style="color:#b42318; padding:20px;">加载失败: ' + e.message + '</div>';
    } finally {
        document.getElementById('jin-loading').style.display = 'none';
        document.getElementById('jin-grid').style.opacity = '1';
    }
}

function refreshJin() {
    const btn = document.getElementById('jin-refresh-btn');
    btn.textContent = '↻ 刷新中…';
    btn.disabled = true;
    fetch('/api/jin-view/refresh', { method: 'POST' })
        .finally(() => loadJin(false).finally(() => {
            btn.textContent = '↻ 刷新';
            btn.disabled = false;
        }));
}

loadJin(true);

// ── 卖点分析 ────────────────────────────────────────────────────────────────
const VERDICT_LABELS = { EXIT:'清仓', REDUCE:'减仓', WATCH:'观察', HOLD:'持有' };

function renderSellPanel(data) {
    if (data.error) return `<div style="color:#b42318;">分析失败: ${data.error}</div>`;
    const ts = data.technical_signal || {};
    const ss = data.strategic_signal || {};
    const sy = data.synthesis || {};
    const m  = data.meta || {};

    const verdictHtml = (v) => v ? `<span class="verdict-pill verdict-${v}">${VERDICT_LABELS[v]||v}</span>` : '';
    const conflictHtml = sy.has_conflict
        ? `<span class="conflict-tag">⚡ 分歧</span>` : '';

    return `
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px;">
      <div style="background:rgba(255,255,255,0.03); border-radius:6px; padding:8px 10px;">
        <div style="font-size:10px; color:#697386; margin-bottom:4px;">📈 技术面</div>
        <div style="display:flex; align-items:center; gap:6px; margin-bottom:4px;">${verdictHtml(ts.verdict)}
          <span style="font-size:10px; color:#697386;">置信度 ${((ts.confidence||0)*100).toFixed(0)}%</span>
        </div>
        <div style="font-size:10px; color:#697386;">${ts.summary||''}</div>
        ${(ts.key_signals||[]).map(s=>`<div style="font-size:10px; color:#697386; margin-top:2px;">· ${s}</div>`).join('')}
      </div>
      <div style="background:rgba(255,255,255,0.03); border-radius:6px; padding:8px 10px;">
        <div style="font-size:10px; color:#697386; margin-bottom:4px;">🏮 鸡哥战略</div>
        <div style="display:flex; align-items:center; gap:6px; margin-bottom:4px;">${verdictHtml(ss.verdict)}
          <span style="font-size:10px; color:#697386;">置信度 ${((ss.confidence||0)*100).toFixed(0)}%</span>
        </div>
        <div style="font-size:10px; color:#697386;">${ss.summary||''}</div>
        ${ss.key_reason ? `<div style="font-size:10px; color:#697386; margin-top:2px;">· ${ss.key_reason}</div>` : ''}
      </div>
    </div>
    <div style="background:rgba(94,106,210,0.07); border:1px solid rgba(94,106,210,0.2); border-radius:6px; padding:9px 11px;">
      <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px;">
        <span style="font-size:10px; font-weight:700; color:#a5b4fc;">综合裁决</span>
        ${verdictHtml(sy.verdict)} ${conflictHtml}
      </div>
      ${sy.has_conflict && sy.conflict_reason ? `<div style="font-size:10px; color:#fca5a5; margin-bottom:5px;">分歧：${sy.conflict_reason}</div>` : ''}
      <div style="font-size:11px; color:#e2e8f0; margin-bottom:5px;">${sy.recommended_action||''}</div>
      ${sy.trigger_to_sell ? `<div style="font-size:10px; color:#697386;">触发条件：${sy.trigger_to_sell}</div>` : ''}
    </div>
    ${m.nearest_resistance ? `<div style="margin-top:7px; font-size:10px; color:#697386;">
      当前 <b style="color:#0a2540;">$${m.current_price}</b> ·
      阻力 <b style="color:#b42318;">$${m.nearest_resistance}</b>${m.resistance_pct ? ` (+${m.resistance_pct}%)` : ''} ·
      支撑 <b style="color:#067647;">$${m.nearest_support||'—'}</b>
    </div>` : ''}`;
}

async function runSellAnalysis(symbol, btn) {
    const panel = document.getElementById('sell-panel-' + symbol);
    if (!panel) return;

    // toggle off if already shown
    if (panel.classList.contains('active')) {
        panel.classList.remove('active');
        btn.textContent = '📊 卖点分析';
        return;
    }

    btn.textContent = '⏳ 分析中…';
    btn.disabled = true;
    panel.innerHTML = '<div style="color:#697386; font-size:11px; padding:6px 0;">正在调用双框架分析…</div>';
    panel.classList.add('active');

    try {
        const r = await fetch('/api/sell-analysis', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticker: symbol }),
        });
        const data = await r.json();
        panel.innerHTML = renderSellPanel(data);
    } catch (e) {
        panel.innerHTML = `<div style="color:#b42318;">请求失败: ${e.message}</div>`;
    } finally {
        btn.textContent = '📊 卖点分析 ▲';
        btn.disabled = false;
    }
}
</script>
{% endblock %}
