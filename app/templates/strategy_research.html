{% extends "base.html" %}
{% block content %}

<!-- 页头 -->
<div class="flex justify-between items-center mb-6">
    <div>
        <h1 class="text-xl font-bold text-white">AI 策略研究</h1>
        <p class="text-sm text-gray-500 mt-1">告诉我你的目标，我帮你找有效策略并验证</p>
    </div>
    <a href="/strategies/discover" class="flex items-center gap-2 bg-dark-600 hover:bg-dark-500 border border-dark-500 text-gray-300 text-sm px-4 py-2 rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
        策略库
    </a>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

    <!-- 左侧：请求表单 -->
    <div class="lg:col-span-1">
        <div class="bg-dark-700 rounded-xl border border-dark-600 p-5 sticky top-6">
            <h2 class="text-sm font-semibold text-white mb-4 flex items-center gap-2">
                <svg class="w-4 h-4 text-accent-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                研究参数
            </h2>

            <form
                hx-post="/strategies/research/run"
                hx-target="#research-results"
                hx-swap="innerHTML"
                hx-indicator="#research-loading"
                class="space-y-4">

                <!-- 工具类型 -->
                <div>
                    <label class="text-xs text-gray-400 block mb-1.5">工具类型</label>
                    <select name="instrument" class="w-full bg-dark-800 border border-dark-500 rounded-lg px-3 py-2 text-sm text-white focus:border-accent-blue focus:outline-none">
                        <option value="any">全部工具</option>
                        <option value="stock">正股</option>
                        <option value="sell_put">Sell Put</option>
                        <option value="covered_call">Covered Call</option>
                        <option value="call">买 Call</option>
                        <option value="put">买 Put</option>
                    </select>
                </div>

                <!-- 方向偏好 -->
                <div>
                    <label class="text-xs text-gray-400 block mb-1.5">方向偏好</label>
                    <select name="direction" class="w-full bg-dark-800 border border-dark-500 rounded-lg px-3 py-2 text-sm text-white focus:border-accent-blue focus:outline-none">
                        <option value="any">全部方向</option>
                        <option value="bullish">看涨</option>
                        <option value="bearish">看跌</option>
                        <option value="neutral">中性</option>
                    </select>
                </div>

                <!-- 年化收益目标 -->
                <div>
                    <label class="text-xs text-gray-400 block mb-1.5">年化收益目标 (%)</label>
                    <div class="relative">
                        <input
                            type="number"
                            name="min_annual_return"
                            value="20"
                            min="5"
                            max="100"
                            step="5"
                            class="w-full bg-dark-800 border border-dark-500 rounded-lg px-3 py-2 text-sm text-white pr-8 focus:border-accent-blue focus:outline-none">
                        <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm">%</span>
                    </div>
                    <p class="text-xs text-gray-600 mt-1">仅显示年化收益达到此目标的策略</p>
                </div>

                <!-- 风险承受 -->
                <div>
                    <label class="text-xs text-gray-400 block mb-1.5">风险承受</label>
                    <div class="flex gap-2">
                        <label class="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg border cursor-pointer text-xs risk-radio has-[:checked]:bg-accent-green/10 has-[:checked]:border-accent-green has-[:checked]:text-accent-green bg-dark-800 border-dark-500 text-gray-400">
                            <input type="radio" name="risk_level" value="low" class="sr-only">低
                        </label>
                        <label class="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg border cursor-pointer text-xs risk-radio has-[:checked]:bg-accent-yellow/10 has-[:checked]:border-accent-yellow has-[:checked]:text-accent-yellow bg-dark-800 border-dark-500 text-gray-400">
                            <input type="radio" name="risk_level" value="medium" class="sr-only" checked>中
                        </label>
                        <label class="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg border cursor-pointer text-xs risk-radio has-[:checked]:bg-accent-red/10 has-[:checked]:border-accent-red has-[:checked]:text-accent-red bg-dark-800 border-dark-500 text-gray-400">
                            <input type="radio" name="risk_level" value="high" class="sr-only">高
                        </label>
                        <label class="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg border cursor-pointer text-xs risk-radio has-[:checked]:bg-gray-500/10 has-[:checked]:border-gray-400 has-[:checked]:text-gray-300 bg-dark-800 border-dark-500 text-gray-400">
                            <input type="radio" name="risk_level" value="any" class="sr-only">任意
                        </label>
                    </div>
                </div>

                <!-- 补充说明 -->
                <div>
                    <label class="text-xs text-gray-400 block mb-1.5">补充说明（可选）</label>
                    <textarea
                        name="extra_notes"
                        rows="3"
                        placeholder="例如：我有10万资金，不想持仓超过1个月，偏好科技股..."
                        class="w-full bg-dark-800 border border-dark-500 rounded-lg px-3 py-2 text-sm text-white resize-none focus:border-accent-blue focus:outline-none placeholder-gray-600"></textarea>
                </div>

                <!-- 提交按钮 -->
                <button
                    type="submit"
                    class="w-full py-2.5 rounded-lg bg-accent-blue text-white text-sm font-semibold hover:brightness-110 transition-all flex items-center justify-center gap-2 relative">
                    <span class="htmx-hide-on-request flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        开始研究
                    </span>
                    <span id="research-loading" class="htmx-indicator flex items-center gap-2">
                        <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                        研究中...
                    </span>
                </button>
            </form>

            <!-- 说明 -->
            <div class="mt-4 p-3 bg-dark-800 rounded-lg border border-dark-600">
                <p class="text-xs text-gray-500 leading-relaxed">
                    <span class="text-accent-blue font-medium">AI 研究</span>会根据你的需求搜索策略、运行回测并验证。
                    若未配置 AI Key，将自动从策略库匹配最符合的策略。
                </p>
                <a href="/settings" class="text-xs text-accent-blue hover:underline mt-1 block">配置 AI Key →</a>
            </div>
        </div>
    </div>

    <!-- 右侧：研究结果 -->
    <div class="lg:col-span-2">
        <div id="research-results">
            <!-- 初始占位 -->
            <div class="flex flex-col items-center justify-center py-24 text-center border border-dashed border-dark-600 rounded-xl">
                <svg class="w-12 h-12 text-gray-700 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                </svg>
                <p class="text-gray-500 text-base mb-1">等待研究请求</p>
                <p class="text-gray-600 text-sm">填写左侧参数，点击「开始研究」</p>
            </div>
        </div>
    </div>

</div>

<style>
/* Radio button visual feedback */
.risk-radio:has(input:checked) {
    font-weight: 600;
}
</style>

{% endblock %}
