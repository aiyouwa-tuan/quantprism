{% extends "base.html" %}
{% block content %}
<div class="flex justify-between items-center mb-6">
    <div>
        <h1 class="text-xl font-bold text-white">策略管理</h1>
        <p class="text-sm text-gray-500 mt-1">查看、编辑、启停你的交易策略</p>
    </div>
</div>

<!-- 新建策略 -->
<div class="bg-dark-700 rounded-xl border border-dark-600 mb-6">
    <details>
        <summary class="px-5 py-3 text-sm text-accent-green cursor-pointer hover:text-white">+ 新建策略</summary>
        <form hx-post="/strategies/create" hx-target="#strategy-list" hx-swap="innerHTML" class="px-5 pb-5 space-y-3">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-xs text-gray-500">策略名称</label>
                    <input type="text" name="display_name" placeholder="我的新策略" class="w-full bg-dark-800 border border-dark-500 rounded px-3 py-2 text-sm text-white mt-1" required>
                </div>
                <div>
                    <label class="text-xs text-gray-500">方向</label>
                    <select name="direction" class="w-full bg-dark-800 border border-dark-500 rounded px-3 py-2 text-sm text-white mt-1">
                        <option value="bullish">看涨</option>
                        <option value="bearish">看跌</option>
                        <option value="neutral">中性</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-xs text-gray-500">工具</label>
                    <select name="instrument" class="w-full bg-dark-800 border border-dark-500 rounded px-3 py-2 text-sm text-white mt-1">
                        <option value="stock">正股</option>
                        <option value="call">买 Call</option>
                        <option value="put">买 Put</option>
                        <option value="sell_put">Sell Put</option>
                        <option value="covered_call">Covered Call</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-gray-500">标的池 (逗号分隔)</label>
                    <input type="text" name="symbol_pool" placeholder="AAPL,MSFT,GOOGL" class="w-full bg-dark-800 border border-dark-500 rounded px-3 py-2 text-sm text-white mt-1">
                </div>
            </div>
            <div>
                <label class="text-xs text-gray-500">策略描述</label>
                <textarea name="description" rows="2" placeholder="描述你的策略触发条件和出场规则" class="w-full bg-dark-800 border border-dark-500 rounded px-3 py-2 text-sm text-white mt-1"></textarea>
            </div>
            <button type="submit" class="bg-accent-green text-dark-900 px-5 py-2 rounded text-sm font-bold hover:brightness-110">创建策略</button>
        </form>
    </details>
</div>

<!-- 策略列表 -->
<div id="strategy-list">
    {% include "partials/strategy_manage_list.html" %}
</div>
{% endblock %}
