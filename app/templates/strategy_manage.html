{% extends "base.html" %}
{% block content %}
<div class="flex justify-between items-center mb-6">
    <div>
        <h1 class="text-xl font-bold text-white">策略管理</h1>
        <p class="text-sm text-gray-500 mt-1">查看、编辑、启停你的交易策略</p>
    </div>
</div>

<!-- 新建策略 -->
<div class="bg-dark-700 rounded-xl border border-dark-600 mb-4">
    <details>
        <summary class="px-5 py-3 text-sm text-accent-green cursor-pointer hover:text-white">+ 新建策略</summary>
        <form hx-post="/strategies/create" hx-target="#strategy-list" hx-swap="innerHTML" class="px-5 pb-5 space-y-3">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-xs text-gray-500">策略名称</label>
                    <input type="text" name="display_name" placeholder="我的新策略" class="w-full bg-dark-800 border border-dark-500 rounded px-3 py-2 text-sm text-white mt-1" required>
                </div>
                <div>
                    <label class="text-xs text-gray-500">方向</label>
                    <select name="direction" class="w-full bg-dark-800 border border-dark-500 rounded px-3 py-2 text-sm text-white mt-1">
                        <option value="bullish">看涨</option>
                        <option value="bearish">看跌</option>
                        <option value="neutral">中性</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-xs text-gray-500">工具</label>
                    <select name="instrument" class="w-full bg-dark-800 border border-dark-500 rounded px-3 py-2 text-sm text-white mt-1">
                        <option value="stock">正股</option>
                        <option value="call">买 Call</option>
                        <option value="put">买 Put</option>
                        <option value="sell_put">Sell Put</option>
                        <option value="covered_call">Covered Call</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-gray-500">标的池 (逗号分隔)</label>
                    <input type="text" name="symbol_pool" placeholder="AAPL,MSFT,GOOGL" class="w-full bg-dark-800 border border-dark-500 rounded px-3 py-2 text-sm text-white mt-1">
                </div>
            </div>
            <div>
                <label class="text-xs text-gray-500">策略描述</label>
                <textarea name="description" rows="2" placeholder="描述你的策略触发条件和出场规则" class="w-full bg-dark-800 border border-dark-500 rounded px-3 py-2 text-sm text-white mt-1"></textarea>
            </div>
            <button type="submit" class="bg-accent-green text-dark-900 px-5 py-2 rounded text-sm font-bold hover:brightness-110">创建策略</button>
        </form>
    </details>
</div>

<!-- 筛选栏 -->
<div class="flex gap-2 items-center mb-4 flex-wrap">
    <span class="text-xs text-gray-500">工具:</span>
    <button onclick="filterStrategies('all','instrument')" class="strat-filter-inst text-xs px-2.5 py-1 rounded bg-dark-500 text-white" data-val="all">全部</button>
    <button onclick="filterStrategies('stock','instrument')" class="strat-filter-inst text-xs px-2.5 py-1 rounded bg-dark-600 text-gray-400 hover:text-white" data-val="stock">正股</button>
    <button onclick="filterStrategies('sell_put','instrument')" class="strat-filter-inst text-xs px-2.5 py-1 rounded bg-dark-600 text-gray-400 hover:text-white" data-val="sell_put">Sell Put</button>
    <button onclick="filterStrategies('call','instrument')" class="strat-filter-inst text-xs px-2.5 py-1 rounded bg-dark-600 text-gray-400 hover:text-white" data-val="call">Call</button>
    <button onclick="filterStrategies('covered_call','instrument')" class="strat-filter-inst text-xs px-2.5 py-1 rounded bg-dark-600 text-gray-400 hover:text-white" data-val="covered_call">Covered Call</button>
    <button onclick="filterStrategies('put','instrument')" class="strat-filter-inst text-xs px-2.5 py-1 rounded bg-dark-600 text-gray-400 hover:text-white" data-val="put">Put</button>

    <span class="text-xs text-gray-500 ml-4">方向:</span>
    <button onclick="filterStrategies('all','direction')" class="strat-filter-dir text-xs px-2.5 py-1 rounded bg-dark-500 text-white" data-val="all">全部</button>
    <button onclick="filterStrategies('bullish','direction')" class="strat-filter-dir text-xs px-2.5 py-1 rounded bg-dark-600 text-gray-400 hover:text-white" data-val="bullish">看涨</button>
    <button onclick="filterStrategies('bearish','direction')" class="strat-filter-dir text-xs px-2.5 py-1 rounded bg-dark-600 text-gray-400 hover:text-white" data-val="bearish">看跌</button>
    <button onclick="filterStrategies('neutral','direction')" class="strat-filter-dir text-xs px-2.5 py-1 rounded bg-dark-600 text-gray-400 hover:text-white" data-val="neutral">中性</button>

    <span class="text-xs text-gray-500 ml-4">状态:</span>
    <button onclick="filterStrategies('all','status')" class="strat-filter-status text-xs px-2.5 py-1 rounded bg-dark-500 text-white" data-val="all">全部</button>
    <button onclick="filterStrategies('active','status')" class="strat-filter-status text-xs px-2.5 py-1 rounded bg-dark-600 text-gray-400 hover:text-white" data-val="active">已启用</button>
    <button onclick="filterStrategies('inactive','status')" class="strat-filter-status text-xs px-2.5 py-1 rounded bg-dark-600 text-gray-400 hover:text-white" data-val="inactive">已禁用</button>
</div>

<!-- 策略列表 -->
<div id="strategy-list">
    {% include "partials/strategy_manage_list.html" %}
</div>

<script>
var currentFilters = { instrument: 'all', direction: 'all', status: 'all' };

function filterStrategies(value, type) {
    currentFilters[type] = value;

    // 更新按钮样式
    var cls = 'strat-filter-' + (type === 'instrument' ? 'inst' : type === 'direction' ? 'dir' : 'status');
    document.querySelectorAll('.' + cls).forEach(function(btn) {
        if (btn.dataset.val === value) {
            btn.className = cls + ' text-xs px-2.5 py-1 rounded bg-dark-500 text-white';
        } else {
            btn.className = cls + ' text-xs px-2.5 py-1 rounded bg-dark-600 text-gray-400 hover:text-white';
        }
    });

    applyFilters();
}

function applyFilters() {
    document.querySelectorAll('.strategy-card').forEach(function(card) {
        var showInst = currentFilters.instrument === 'all' || card.dataset.instrument === currentFilters.instrument;
        var showDir = currentFilters.direction === 'all' || card.dataset.direction === currentFilters.direction;
        var showStatus = currentFilters.status === 'all' || card.dataset.status === currentFilters.status;
        card.style.display = (showInst && showDir && showStatus) ? '' : 'none';
    });
}

// Re-apply filters after HTMX swaps the strategy list (e.g., after toggle)
document.addEventListener('htmx:afterSwap', function(evt) {
    if (evt.detail.target && evt.detail.target.id === 'strategy-list') {
        applyFilters();
    }
});
</script>
{% endblock %}
