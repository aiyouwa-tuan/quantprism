{% if configs %}
{% for c in configs %}
<div class="bg-dark-800 rounded-lg p-3 mb-2 flex justify-between items-center">
    <div>
        <span class="text-sm text-white">{{ c.strategy_name }}</span>
        <span class="text-xs text-gray-500 ml-2">{{ c.symbol }}</span>
    </div>
    <div class="flex gap-1">
        <button hx-post="/strategies/{{ c.id }}/backtest" hx-target="#results"
                class="text-xs bg-accent-blue/20 text-accent-blue px-2 py-1 rounded hover:bg-accent-blue/30">回测</button>
        <button hx-post="/strategies/{{ c.id }}/stress-test" hx-target="#results"
                class="text-xs bg-accent-red/20 text-accent-red px-2 py-1 rounded hover:bg-accent-red/30">压力</button>
    </div>
</div>
{% endfor %}
{% else %}
<p class="text-xs text-gray-500">无</p>
{% endif %}
