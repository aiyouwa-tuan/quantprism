{% if configs %}
{% for c in configs %}
<div class="border rounded p-3 mb-2">
    <div class="flex justify-between items-center">
        <span class="font-medium text-sm">{{ c.strategy_name }}</span>
        <span class="text-xs text-gray-400">{{ c.symbol }}</span>
    </div>
    <div class="mt-2 flex gap-2">
        <button hx-post="/strategies/{{ c.id }}/backtest" hx-target="#match-results"
                class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded hover:bg-blue-200">回测</button>
        <button hx-post="/strategies/{{ c.id }}/stress-test" hx-target="#match-results"
                class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded hover:bg-red-200">压力测试</button>
    </div>
</div>
{% endfor %}
{% else %}
<p class="text-sm text-gray-400">还没有配置策略</p>
{% endif %}
