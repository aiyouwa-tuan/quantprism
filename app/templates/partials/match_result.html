{% if matches %}
<div class="space-y-3">
    {% for m in matches %}
    <div class="bg-dark-800 rounded-lg p-4 border {{ 'border-accent-green/30' if m.compatible else 'border-dark-600' }}">
        <div class="flex justify-between items-center">
            <span class="text-white font-medium">{{ m.strategy_name }}</span>
            <span class="text-xs px-2 py-0.5 rounded {{ 'bg-accent-green/20 text-accent-green' if m.compatible else 'bg-accent-red/20 text-accent-red' }}">{{ '兼容' if m.compatible else '不兼容' }}</span>
        </div>
        <div class="grid grid-cols-3 gap-2 text-xs mt-2 text-center">
            <div><span class="text-gray-500">Sharpe</span><div class="text-white">{{ m.metrics.sharpe_ratio }}</div></div>
            <div><span class="text-gray-500">年化</span><div class="{{ 'text-accent-green' if m.metrics.annual_return > 0 else 'text-accent-red' }}">{{ "%.1f"|format(m.metrics.annual_return * 100) }}%</div></div>
            <div><span class="text-gray-500">回撤</span><div class="text-accent-red">{{ "%.1f"|format(m.metrics.max_drawdown * 100) }}%</div></div>
        </div>
        <p class="text-xs mt-2 {{ 'text-accent-green' if m.compatible else 'text-accent-red' }}">{{ m.recommendation }}</p>
    </div>
    {% endfor %}
</div>
{% endif %}
