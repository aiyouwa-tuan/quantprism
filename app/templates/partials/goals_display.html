{% if goals %}
<div class="bg-dark-800 rounded-lg p-3 space-y-1.5 text-sm">
    <div class="flex justify-between"><span class="text-gray-400">年化收益目标</span><span class="text-accent-green font-medium">{{ "%.1f"|format(goals.annual_return_target * 100) }}%</span></div>
    <div class="flex justify-between"><span class="text-gray-400">最大回撤</span><span class="text-accent-red font-medium">{{ "%.1f"|format(goals.max_drawdown * 100) }}%</span></div>
    <div class="flex justify-between"><span class="text-gray-400">单笔风险</span><span class="text-white">{{ "%.1f"|format(goals.risk_per_trade * 100) }}%</span></div>
    {% if constraints %}
    <div class="border-t border-dark-600 pt-1.5 mt-1.5">
        <div class="flex justify-between"><span class="text-gray-500">持仓上限</span><span class="text-accent-blue font-bold">{{ constraints.max_positions }} 个</span></div>
    </div>
    {% endif %}
    <a href="/strategies" class="block mt-2 text-center bg-accent-green text-dark-900 py-1.5 rounded text-xs font-bold hover:brightness-110">搜索策略 →</a>
</div>
{% endif %}
